{% extends "base.html" %}
{% block content %}

<h1>Today's Sales</h1>

<table style="width:100%; border-collapse:collapse;">
    <tr style="background:#0a1f44; color:white;">
        <th style="padding:12px;">Receipt</th>
        <th>Item</th>
        <th>Total</th>
        <th>Time</th>
        <th>Action</th>
    </tr>

    {% for sale in sales %}
    <tr style="border-bottom:1px solid #ddd;">
        <td style="padding:12px;">REC-00{{ sale.id }}</td>
        <td>{{ sale.item.name }}</td>
        <td>UGX {{ sale.total_price }}</td>
        <td>{{ sale.date_sold|time:"H:i" }}</td>
        <td>
            <a href="{% url 'sale_detail' sale.id %}"
               style="
                   background:#27ae60;
                   color:white;
                   padding:8px 15px;
                   text-decoration:none;
                   border-radius:5px;
               ">
               View
            </a>
        </td>
    </tr>
    {% empty %}
    <tr>
        <td colspan="5" style="text-align:center; padding:20px;">
            No sales recorded today
        </td>
    </tr>
    {% endfor %}
</table>

{% endblock %}
