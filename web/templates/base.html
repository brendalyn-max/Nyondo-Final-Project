<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>{% block title %}Nyondo Hardware{% endblock %}</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            background: #f4f7f6;
            display: flex;
        }

        /* Sidebar Styling */
        .sidebar {
            width: 250px;
            background: #0a1f44;
            color: white;
            height: 100vh;
            position: fixed;
        }

        .sidebar h2 {
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid #1a3a6d;
            margin: 0;
        }

        .sidebar a {
            display: block;
            color: #a5b1c2;
            padding: 15px 25px;
            text-decoration: none;
            transition: 0.3s;
        }

        .sidebar a:hover,
        .sidebar a.active {
            background: #123366;
            color: white;
            border-left: 4px solid #27ae60;
        }

        /* Main Layout */
        .main-container {
            flex-grow: 1;
            margin-left: 250px;
        }

        .topbar {
            background: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .content {
            padding: 30px;
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
        }

        .modal:target {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 8px;
            width: 400px;
            position: relative;
        }

        .close {
            position: absolute;
            right: 20px;
            top: 10px;
            font-size: 24px;
            text-decoration: none;
            color: #333;
        }
    </style>
</head>

<body>
    <div class="sidebar">
        <h2>Nyondo</h2>
        <a href="{% url 'home' %}"
            class="{% if request.resolver_match.url_name == 'home' %}active{% endif %}">Dashboard</a>
        <a href="{% url 'stock_list' %}"
            class="{% if request.resolver_match.url_name == 'stock_list' %}active{% endif %}">Stock Inventory</a>
        <a href="{% url 'record_sale' %}"
            class="{% if request.resolver_match.url_name == 'record_sale' %}active{% endif %}">Record Sale</a>


        <!-- Only visible to authorized roles -->
        {% if user.is_staff %}
        <a href="#">Reports</a>
        <a href="#">User Management</a>
        {% endif %}

        <a href="{% url 'logout' %}" style="margin-top: 50px; color: #eb4d4b;">Logout</a>
    </div>

    <div class="main-container">
        <div class="topbar">
            <span>{{ user.get_full_name|default:user.username }} ({{ user.role|default:"Staff" }})</span>
            <span style="color: #7f8c8d;">{{ today|date:"D, d M Y" }}</span>
        </div>

        <div class="content">
            {% block content %}{% endblock %}
        </div>
    </div>
</body>

</html>
